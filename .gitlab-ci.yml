variables:
  CI_DISPOSABLE_ENVIRONMENT: "true"
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://localhost:2375
  DOCKER_TLS_CERTDIR: ""

.base:
  image: xenoky/lwk-builder@sha256:b3ed5a58a179e228cc25c632ce28aaab641df247fef9c649064a3eff44773b87
  tags:
    - cloud
  retry:
    max: 2
    when:
      - runner_system_failure
      - unknown_failure
      - stuck_or_timeout_failure  
  services:
    - docker:20.10.12-dind

mdbook-snippets-py:
  extends: .base
  script:
    # setup env variables
    - cp ./context/env.sh / && cd / && . ./env.sh && cd -
    # build python wheel
    - cd lwk_bindings/
    - python3 -m venv venv
    - source venv/bin/activate
    # install maturin
    - python3 -m pip install maturin maturin[patchelf] uniffi-bindgen==0.28.0
    # build and install python wheel
    - maturin develop --compatibility manylinux2014 --release -m lwk_bindings/Cargo.toml -b uniffi
    # run tests
    - cd ../docs/snippets/python
    - python3 signer.py
